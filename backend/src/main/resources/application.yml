spring:
  application:
    name: inteko-backend
  
  profiles:
    active: dev
  
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    rw.gov.inteko: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refreshExpiration: 604800000

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
