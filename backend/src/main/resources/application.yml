spring:
  application:
    name: inteko-backend
  
  profiles:
    active: dev
  
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  flyway:
    enabled: true
    baseline-on-migrate: true

server:
  port: 8080
  servlet:
    context-path: /api/v1

logging:
  level:
    rw.gov.inteko: DEBUG
    org.springframework.web: INFO
    org.hibernate: INFO

jwt:
  secret: ${JWT_SECRET:inteko-super-secret-key-change-this-in-production-minimum-256-bits-required}
  expiration: 86400000
  refreshExpiration: 604800000
