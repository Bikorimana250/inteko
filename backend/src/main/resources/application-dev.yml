spring:
  # Using H2 in-memory database (no PostgreSQL needed for now)
  datasource:
    url: jdbc:h2:mem:inteko_db
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
      path: /h2-console
  
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  
  flyway:
    enabled: false

logging:
  level:
    rw.gov.inteko: DEBUG
    org.springframework.security: DEBUG

# Dev-only fallback — never use this value in production
jwt:
  secret: ${JWT_SECRET:dev-only-secret-key-not-for-production-use-minimum-256-bits}
