spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:inteko_db}}
    username: ${DATABASE_USERNAME:${DB_USERNAME:inteko_user}}
    password: ${DATABASE_PASSWORD:${DB_PASSWORD:inteko_pass}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: public
        jdbc:
          lob:
            non_contextual_creation: true
        temp:
          use_jdbc_metadata_defaults: false
  
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    schemas: public
    validate-on-migrate: false
    clean-disabled: true

logging:
  level:
    rw.gov.inteko: INFO
    org.springframework.web: INFO
    org.hibernate: WARN
    org.flywaydb: INFO
